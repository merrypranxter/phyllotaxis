<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phyllotaxis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 0; right: 0;
      width: 240px;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(8px);
      border-left: 1px solid rgba(255,255,255,0.07);
      padding: 16px;
      color: rgba(255,255,255,0.85);
      font-size: 11px; line-height: 1.6;
      z-index: 10; user-select: none;
      overflow-y: auto; max-height: 100vh;
    }
    #ui h2 {
      font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 8px;
    }
    .section-label {
      font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin: 12px 0 6px;
    }
    .param { margin-bottom: 8px; }
    .param label { display: flex; justify-content: space-between; margin-bottom: 3px; color: rgba(255,255,255,0.65); }
    .param label span { color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; }
    input[type=range] {
      width: 100%; height: 2px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.12); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: rgba(255,255,255,0.75); cursor: pointer;
    }
    .regime-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px; }
    .regime-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); padding: 5px 4px;
      font-size: 9px; letter-spacing: 0.06em;
      cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .regime-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .regime-btn.active { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.28); color: #fff; }
    .fps { position: fixed; bottom: 8px; left: 8px; font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.2); z-index: 10; }
    #hint { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-family: monospace; font-size: 9px; color: rgba(255,255,255,0.18); z-index: 10; letter-spacing: 0.1em; }
    #fib-label {
      font-size: 9px; color: rgba(255,200,80,0.5); margin-top: 4px;
      letter-spacing: 0.04em; min-height: 14px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h2>Phyllotaxis</h2>

    <div class="section-label">Regime</div>
    <div class="regime-btns">
      <button class="regime-btn active" data-regime="sunflower_classic">sunflower</button>
      <button class="regime-btn" data-regime="angle_sweep">angle sweep</button>
      <button class="regime-btn" data-regime="succulent_jewel">succulent</button>
      <button class="regime-btn" data-regime="fibonacci_sphere_swarm">fib sphere</button>
    </div>

    <div class="section-label">Arrangement</div>
    <div class="param">
      <label>divergence angle <span id="v-divergence_angle">137.51</span>°</label>
      <input type="range" id="divergence_angle" min="130" max="145" step="0.001" value="137.507">
    </div>
    <div id="fib-label"></div>
    <div class="param">
      <label>point count N <span id="v-point_count">1597</span></label>
      <input type="range" id="point_count" min="100" max="4000" step="1" value="1597">
    </div>
    <div class="param">
      <label>radius scale <span id="v-radius_scale">1.00</span></label>
      <input type="range" id="radius_scale" min="0.3" max="3.0" step="0.01" value="1.0">
    </div>

    <div class="section-label">Floret</div>
    <div class="param">
      <label>floret size <span id="v-floret_size">1.00</span></label>
      <input type="range" id="floret_size" min="0.1" max="4.0" step="0.01" value="1.0">
    </div>
    <div class="param">
      <label>rotation speed <span id="v-rotation_speed">0.00</span></label>
      <input type="range" id="rotation_speed" min="0" max="1" step="0.01" value="0">
    </div>
    <div class="param">
      <label>grow speed <span id="v-grow_speed">0.00</span></label>
      <input type="range" id="grow_speed" min="0" max="2" step="0.01" value="0">
    </div>

    <div class="section-label">Post</div>
    <div class="param">
      <label>bloom <span id="v-bloom">0.30</span></label>
      <input type="range" id="bloom" min="0" max="1" step="0.01" value="0.3">
    </div>
    <div class="param">
      <label>chromatic ab. <span id="v-chromatic">0.20</span></label>
      <input type="range" id="chromatic" min="0" max="1" step="0.01" value="0.2">
    </div>
    <div class="param">
      <label>vignette <span id="v-vignette">0.40</span></label>
      <input type="range" id="vignette" min="0" max="1" step="0.01" value="0.4">
    </div>
  </div>

  <div class="fps" id="fps">-- fps</div>
  <div id="hint">137.507° — the number that makes the spirals count themselves</div>

  <script src="src/js/main.js" type="module"></script>
</body>
</html>
